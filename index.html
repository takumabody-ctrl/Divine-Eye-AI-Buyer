<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神眼AIバイヤー - プロ仕様鑑定ツール</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --primary: #00ffcc;
            --accent: #8e2de2;
            --text: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ff4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 認証用 */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            border: 1px solid #333;
        }

        /* カード・UI */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 5px;
            margin-top: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: #262626;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #000;
        }

        .btn-sub {
            background: #333;
            color: #fff;
            font-size: 0.85rem;
            padding: 10px;
        }

        /* プレビュー */
        .preview-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .preview-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
        }

        /* ローダー */
        .loader {
            text-align: center;
            padding: 20px;
            display: none;
            color: var(--primary);
            font-weight: bold;
        }

        /* リザルト */
        .result-box {
            display: none;
            margin-top: 15px;
            border-top: 2px solid var(--accent);
            padding-top: 15px;
        }

        .rank-badge {
            font-size: 2.7rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }

        .profit-display {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin: 10px 0;
        }

        .ai-inner-card {
            background: rgba(142, 45, 226, 0.1);
            border: 1px solid rgba(142, 45, 226, 0.3);
            padding: 14px;
            border-radius: 8px;
            margin-top: 12px;
        }

        /* タブバー */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .tab {
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            flex: 1;
            opacity: 0.8;
        }

        .tab.active {
            color: var(--primary);
            opacity: 1;
            border-top: 2px solid var(--primary);
        }

        /* デバッグログ */
        #debug-log {
            font-size: 0.7rem;
            background: #000;
            color: #0fbc00;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            display: none;
            font-family: monospace;
            border: 1px solid #222;
        }
    </style>
</head>

<body>

    <!-- 認証画面 -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom:10px;">God Eye AI Buyer</h2>
            <p style="font-size:0.8rem; color:var(--text-sub);">パスワードを入力してください</p>
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn btn-primary" onclick="checkAuth()">Login</button>
        </div>
    </div>

    <div style="background: #ff3366; color: #fff; font-size: 0.7rem; text-align: center; padding: 5px;">
        💡 ブラウザの「共有」⇒「ホーム画面に追加」でスマホアプリとして使えます！
    </div>

    <div class="container" id="main-content" style="display:none;">
        <div id="view-judge">
            <h1>� 神眼AIバイヤー</h1>

            <div class="card">
                <div style="font-size:0.95rem; font-weight:bold; margin-bottom:8px;">📸 商品撮影・鑑定（最大15枚）</div>
                <label class="btn btn-sub" style="text-align:center; display:block;" for="input-img">写真を撮影・追加</label>
                <input type="file" id="input-img" accept="image/*" multiple style="display:none"
                    onchange="handleImages(event)">
                <div class="preview-gallery" id="preview-gallery"></div>
                <button id="btn-clear"
                    style="display:none; background:transparent; color:#888; border:none; margin: 10px auto; font-size:0.75rem;"
                    onclick="clearAll()">🗑 写真をすべてクリア</button>

                <button class="btn btn-primary" id="btn-run" onclick="analyzeImages()"
                    style="margin-top:15px; display:none;">🔍 AI鑑定・実売検索を開始</button>
                <div class="loader" id="loader">⌛ <span id="loader-status">データを抽出中...</span></div>
            </div>

            <div class="card input-group">
                <label>販売手数料</label>
                <select id="val-platform">
                    <option value="0.10">メルカリ (10%)</option>
                    <option value="0.088">ヤフオク (8.8%)</option>
                    <option value="0.06">ラクマ (6.0%)</option>
                </select>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <label>仕入値 (円)<input type="number" id="val-buy" value="0"></label>
                    <label>見込価格 (円)<input type="number" id="val-sell" value="0"></label>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <label>送料 (円)<input type="number" id="val-shipping" value="750"></label>
                    <label>梱包費 (円)<input type="number" id="val-packing" value="90"></label>
                </div>

                <label>ブランド名 (AIが自動入力します)</label>
                <input type="text" id="val-brand" placeholder="ブランド名">

                <label>Gemini APIキー</label>
                <input type="password" id="api-key" placeholder="API Key">
                <select id="model-select" style="margin-top:8px;">
                    <option value="auto">✨ モデル自動探索 (推奨)</option>
                    <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (最新)</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (安定)</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (超高精度)</option>
                </select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-sub" style="flex:1;" onclick="runAPITest()">⚙️ 接続テスト</button>
                    <button class="btn btn-sub" style="flex:1; background:#8e2de2;" onclick="manualReserch()">🛍
                        メルカリ市場調査</button>
                </div>
            </div>

            <div id="debug-log">[DEBUG CONSOLE]<br></div>

            <div class="result-box" id="result-box">
                <div class="rank-badge" id="res-rank">-</div>
                <div style="text-align:center; font-size:0.9rem; color:var(--text-sub); border-bottom: 1px solid #333; padding-bottom:10px;"
                    id="res-name">アイテム特定済み</div>
                <div class="profit-display" id="res-profit">¥0</div>
                <div style="text-align:center; font-size:0.8rem; color:#38ef7d; margin-bottom:10px;" id="res-margin">利益率
                    0%</div>

                <div class="ai-inner-card">
                    <div style="color:var(--primary); font-size:0.9rem; font-weight:bold; margin-bottom:5px;">🤖
                        AIプロ鑑定総論</div>
                    <div id="res-advice" style="font-size:0.85rem; line-height:1.5;"></div>
                </div>

                <div id="res-questions-box" class="ai-inner-card" style="border-color:#00aaff; display:none;">
                    <div style="color:#00aaff; font-size:0.9rem; font-weight:bold; margin-bottom:5px;">💬 AIからの確認事項
                    </div>
                    <div id="res-questions" style="font-size:0.85rem;"></div>
                </div>

                <div id="res-strategy-box" class="ai-inner-card" style="border-color:#38ef7d;">
                    <div style="color:#38ef7d; font-size:0.9rem; font-weight:bold; margin-bottom:5px;">💡 高利益販売・セット戦略
                    </div>
                    <div id="res-strategy" style="font-size:0.85rem;"></div>
                </div>

                <div id="res-sold-box" class="ai-inner-card" style="border-color:#ff5722;">
                    <div style="color:#ff5722; font-size:0.9rem; font-weight:bold; margin-bottom:5px;">📈 実売（SOLD）データ根拠
                    </div>
                    <div id="res-sold" style="font-size:0.85rem;"></div>
                </div>

                <div id="res-negotiation-box" class="ai-inner-card" style="border-color:#ffd700;">
                    <div style="color:#ffd700; font-size:0.9rem; font-weight:bold; margin-bottom:5px;">🏢 業者買取・交渉フレーズ
                    </div>
                    <div id="res-negotiation" style="font-size:0.85rem;"></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                    <button class="btn" style="background:#00c853; color:#fff;" onclick="shareToLine()">💬
                        LINE共有</button>
                    <button class="btn" style="background:#555; color:#fff;" onclick="saveToStock()">💾 在庫保存</button>
                </div>
            </div>

            <div style="text-align:center; margin-top:30px; font-size:0.65rem; color:#444;">Ver 1.3.2 - Feature
                Refinement Edition</div>
        </div>

        <div id="view-db" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>📊 在庫管理庫</h1>
                <button onclick="localStorage.removeItem('GOD_EYE_DB'); renderDB();"
                    style="font-size:0.6rem; background:none; border:1px solid #444; color:#888;">全消去</button>
            </div>
            <div id="db-list"></div>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar" style="display:none;">
        <a href="#" class="tab active" id="tab-judge" onclick="switchView('judge')">判定室</a>
        <a href="#" class="tab" id="tab-db" onclick="switchView('db')">在庫庫</a>
    </div>

    <script>
        const PASS = "s9mxp3ao7kj1";
        let selectedB64 = [];
        let inventory = JSON.parse(localStorage.getItem('GOD_EYE_DB') || '[]');

        function checkAuth() {
            if (document.getElementById('auth-pass').value === PASS) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('tab-bar').style.display = 'flex';
                const k = localStorage.getItem('GOD_EYE_API');
                if (k) document.getElementById('api-key').value = k;
            } else { alert("不正なパスワードです"); }
        }

        function log(m) {
            const d = document.getElementById('debug-log');
            d.style.display = 'block';
            d.innerHTML += `> ${m}<br>`;
            d.scrollTop = d.scrollHeight;
        }

        async function handleImages(e) {
            const files = Array.from(e.target.files).slice(0, 15);
            document.getElementById('loader').style.display = 'block';
            for (let f of files) {
                await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 512) { h *= 512 / w; w = 512; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            const b64 = canvas.toDataURL('image/jpeg', 0.55);
                            selectedB64.push(b64.split(',')[1]);
                            const thumb = document.createElement('img'); thumb.src = b64; thumb.className = 'preview-img';
                            document.getElementById('preview-gallery').appendChild(thumb);
                            r();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(f);
                });
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btn-clear').style.display = 'block';
            document.getElementById('btn-run').style.display = 'block';
        }

        function clearAll() {
            selectedB64 = [];
            document.getElementById('preview-gallery').innerHTML = "";
            document.getElementById('btn-clear').style.display = 'none';
            document.getElementById('btn-run').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('debug-log').innerHTML = "[DEBUG CONSOLE]<br>";
        }

        async function runAPITest() {
            const k = document.getElementById('api-key').value.trim();
            if (!k) return alert("Keyを入力してください");
            log("API接続テスト開始...");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                const data = await res.json();
                if (data.models) {
                    const list = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name.split('/').pop());
                    log("✅ 成功。利用可能: " + list.slice(0, 4).join(', '));
                    alert("接続成功！\n\n利用可能な主要モデル:\n" + list.slice(0, 3).join('\n'));
                } else { throw new Error(data.error?.message || "Error"); }
            } catch (e) { log("❌ 失敗: " + e.message); alert("失敗: " + e.message); }
        }

        async function analyzeImages() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return alert("APIキーを入力してください");
            if (selectedB64.length === 0) return alert("写真を撮影してください");

            localStorage.setItem('GOD_EYE_API', key);
            document.getElementById('btn-run').style.display = "none";
            document.getElementById('loader').style.display = "block";
            document.getElementById('result-box').style.display = "none";
            log("--- 解析開始 (" + selectedB64.length + "枚) ---");

            let model = document.getElementById('model-select').value;
            if (model === "auto") {
                log("最適なモデルを自動探索中...");
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                    const d = await r.json();
                    const best = d.models.find(m => m.name.includes("flash-exp") || m.name.includes("flash"));
                    model = best ? best.name.split('/').pop() : "gemini-1.5-flash";
                    log("✨ 検出した最適なモデル: " + model);
                } catch (e) { model = "gemini-1.5-flash"; }
            }

            const prompt = "アパレルせどりプロとして画像を解析せよ。必ず以下のJSONのみで返せ: {item_name, brand, sell_price, advice, questions, strategy, sold_evidence, negotiation, rank}";
            const parts = [{ text: prompt }];
            selectedB64.forEach(b => parts.push({ inline_data: { mime_type: "image/jpeg", data: b } }));

            const versions = ["v1beta", "v1"];
            for (let ver of versions) {
                log(`試行: ${ver} / モデル: ${model}`);
                document.getElementById('loader-status').innerText = `${ver} 経由で解析中...`;
                try {
                    const url = `https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`;
                    const payload = { contents: [{ parts: parts }] };
                    if (ver === "v1beta") {
                        payload.tools = [{ google_search_retrieval: { dynamic_retrieval_config: { mode: "MODE_DYNAMIC", dynamic_threshold: 0.3 } } }];
                    }
                    const res = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
                    const data = await res.json();
                    if (data.error) {
                        log(`エラー受信: ${data.error.message}`);
                        if (data.error.code === 404) continue;
                        throw new Error(data.error.message);
                    }
                    const txt = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);

                    // 表示反映
                    document.getElementById('res-rank').innerText = json.rank || "A";
                    document.getElementById('res-name').innerText = json.item_name || "-";
                    document.getElementById('val-brand').value = json.brand || "";
                    document.getElementById('res-advice').innerHTML = (json.advice || "").replace(/\n/g, '<br>');
                    document.getElementById('res-strategy').innerText = json.strategy || "-";
                    document.getElementById('res-sold').innerText = json.sold_evidence || "-";
                    document.getElementById('res-negotiation').innerText = json.negotiation || "-";

                    if (json.questions) {
                        document.getElementById('res-questions').innerText = json.questions;
                        document.getElementById('res-questions-box').style.display = "block";
                    }

                    // 利益計算
                    const buy = parseFloat(document.getElementById('val-buy').value) || 0;
                    const sell = json.sell_price || parseFloat(document.getElementById('val-sell').value) || 0;
                    document.getElementById('val-sell').value = sell;

                    calculateProfit();

                    document.getElementById('result-box').style.display = "block";
                    log("✅ 解析成功");
                    break;
                } catch (e) {
                    log(`失敗: ${e.message}`);
                    if (ver === "v1") alert("全通信経路でエラーが発生しました。");
                }
            }
            document.getElementById('loader').style.display = "none";
            document.getElementById('btn-run').style.display = "block";
        }

        function calculateProfit() {
            const buy = parseFloat(document.getElementById('val-buy').value) || 0;
            const sell = parseFloat(document.getElementById('val-sell').value) || 0;
            const commission = parseFloat(document.getElementById('val-platform').value);
            const shipping = parseFloat(document.getElementById('val-shipping').value) || 0;
            const packing = parseFloat(document.getElementById('val-packing').value) || 0;

            if (!sell) return;
            const profit = Math.floor(sell - (sell * commission) - shipping - packing - buy);
            const margin = ((profit / sell) * 100).toFixed(1);

            document.getElementById('res-profit').innerText = `利益予測 ¥${profit.toLocaleString()}`;
            document.getElementById('res-margin').innerText = `利益率 ${margin}%`;

            const r = document.getElementById('res-rank');
            if (profit > 10000) { r.innerText = "S"; r.style.color = "#ffd700"; }
            else if (profit > 3000) { r.innerText = "A"; r.style.color = "#00ffcc"; }
            else if (profit > 0) { r.innerText = "B"; r.style.color = "#00aaff"; }
            else { r.innerText = "C"; r.style.color = "#ff4444"; }
        }

        function manualReserch() {
            const b = document.getElementById('val-brand').value;
            if (!b) return alert("ブランド名を入力してください");
            window.open(`https://jp.mercari.com/search?keyword=${encodeURIComponent(b)}&status=sold_out`);
        }

        function switchView(v) {
            document.getElementById('view-judge').style.display = v === 'judge' ? 'block' : 'none';
            document.getElementById('view-db').style.display = v === 'db' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + v).classList.add('active');
            if (v === 'db') renderDB();
        }

        function renderDB() {
            const list = document.getElementById('db-list');
            inventory = JSON.parse(localStorage.getItem('GOD_EYE_DB') || '[]');
            list.innerHTML = inventory.length ? "" : "<p style='text-align:center; color:#555; margin-top:50px;'>まだデータはありません</p>";
            inventory.forEach((item, idx) => {
                const d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<div style="font-size:0.8rem; color:#888;">${item.date}</div>
                <div style="font-weight:bold; margin:5px 0;">${item.name}</div>
                <div style="color:var(--primary); font-weight:bold;">${item.profit}</div>
                <button onclick="delDB(${idx})" style="position:absolute; top:10px; right:10px; background:none; border:none; color:#555;">❌</button>`;
                d.style.position = 'relative';
                list.appendChild(d);
            });
        }
        function saveToStock() {
            const name = document.getElementById('res-name').innerText;
            const profit = document.getElementById('res-profit').innerText;
            inventory.unshift({ name, profit, date: new Date().toLocaleDateString() });
            localStorage.setItem('GOD_EYE_DB', JSON.stringify(inventory));
            alert("在庫リストに保存しました");
        }
        function delDB(i) {
            if (!confirm("削除しますか？")) return;
            inventory.splice(i, 1);
            localStorage.setItem('GOD_EYE_DB', JSON.stringify(inventory));
            renderDB();
        }
        function shareToLine() {
            const msg = `【神眼AI鑑定レポート】\nアイテム: ${document.getElementById('res-name').innerText}\n${document.getElementById('res-profit').innerText}\n判定: ${document.getElementById('res-rank').innerText}\n---\n${document.getElementById('res-advice').innerText}`;
            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`);
        }

        // 入力変更監視
        ['val-buy', 'val-sell', 'val-shipping', 'val-packing', 'val-platform'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateProfit);
        });
    </script>
</body>

</html>
