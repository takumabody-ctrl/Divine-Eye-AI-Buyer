<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>神眼AIバイヤー - Supreme Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg: #050505;
            --card: #121212;
            --primary: #00ffcc;
            --accent: #8e2de2;
            --text: #f0f0f0;
            --text-sub: #888;
            --danger: #ff3366;
            --warning: #ffcc00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Hiragino Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 90px;
            line-height: 1.6;
        }

        .container {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 認証 */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .auth-card {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            border: 1px solid #222;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 1.6rem;
            text-align: center;
            margin: 30px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* カード */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
        }

        .label-sm {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: #222;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main {
            background: #fff;
            color: #000;
        }

        .btn-main:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-sub {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            font-size: 0.85rem;
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #000;
        }

        /* プレビュー */
        .preview-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .preview-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .loader {
            text-align: center;
            padding: 25px;
            display: none;
            font-weight: 600;
        }

        .loader span {
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* リザルト */
        .result-box {
            display: none;
            border-top: 1px solid #333;
            padding-top: 25px;
            margin-top: 10px;
        }

        .rank-title {
            font-size: 0.85rem;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .rank-val {
            font-size: 5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1;
        }

        .res-container {
            background: #111;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #222;
            margin-top: 15px;
        }

        .res-item {
            margin-bottom: 15px;
        }

        .res-header {
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .res-header.S {
            color: var(--warning);
        }

        .res-header.A {
            color: var(--primary);
        }

        .res-body {
            font-size: 0.88rem;
            line-height: 1.6;
            color: #ccc;
        }

        .res-body ul {
            padding-left: 18px;
            margin: 5px 0;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-sub);
            display: block;
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        /* タブ */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            border-top: 1px solid #222;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab i {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        #debug-log {
            font-size: 0.65rem;
            background: #000;
            color: #0fbc00;
            padding: 10px;
            margin-top: 20px;
            border-radius: 10px;
            height: 100px;
            overflow-y: auto;
            display: none;
            font-family: monospace;
            border: 1px solid #222;
        }
    </style>
</head>

<body>

    <!-- 認証画面 -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:#fff; margin-bottom:10px;">God Eye AI</h2>
            <p style="font-size:0.8rem; color:var(--text-sub); margin-bottom:20px;">AUTHENTICATION REQUIRED</p>
            <input type="password" id="auth-pass" placeholder="Master Password">
            <button class="btn btn-accent" onclick="checkAuth()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <div id="view-judge">
            <h1>GOD EYE BUYER</h1>

            <div class="card">
                <span class="label-sm">Visual Scan</span>
                <label class="btn btn-sub" style="text-align:center; display:block;" for="input-img">📷
                    写真を撮影（1〜15枚）</label>
                <input type="file" id="input-img" accept="image/*" multiple style="display:none"
                    onchange="handleImages(event)">
                <div class="preview-gallery" id="preview-gallery"></div>
                <button id="btn-clear"
                    style="display:none; background:transparent; color:#555; border:none; margin: 15px auto; font-size:0.7rem; font-weight:700;"
                    onclick="clearAll()">RESET IMAGES</button>

                <button class="btn btn-accent" id="btn-run" onclick="analyzeImages()"
                    style="margin-top:15px; display:none;">🔍 SCAN & ANALYZE</button>
                <div class="loader" id="loader">⌛ <span>EXPLOITING DATA...</span></div>
            </div>

            <div class="card">
                <span class="label-sm">Field Inputs</span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <label class="label-sm">仕入原価 (必須)<input type="number" id="val-buy" placeholder="0"></label>
                    <label class="label-sm">販売予想価格<input type="number" id="val-sell" placeholder="AI予測を優先"></label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
                    <label class="label-sm">送料目安<input type="number" id="val-shipping" value="750"></label>
                    <label class="label-sm">プラットフォーム
                        <select id="val-platform">
                            <option value="0.10">Mercari (10%)</option>
                            <option value="0.088">Yahoo (8.8%)</option>
                            <option value="0.05">Rakuma (5%)</option>
                        </select>
                    </label>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn btn-sub" style="flex:1;" onclick="runAPITest()">KEY TEST</button>
                    <button class="btn btn-sub" style="flex:2; background:#1a1a1a;" onclick="manualReserch()">🛍 市場調査
                        (Web)</button>
                </div>
                <input type="password" id="api-key" placeholder="API Key"
                    style="margin-top:15px; font-size:0.8rem; background:#000;">
                <input type="hidden" id="val-search-key">
            </div>

            <div id="debug-log"></div>

            <div class="result-box" id="result-box">
                <div id="res-name"
                    style="text-align:center; font-weight:800; font-size:1.2rem; margin-bottom:10px; color:var(--primary);">
                </div>
                <div class="rank-title">INVESTMENT EVALUATION</div>
                <div class="rank-val" id="res-rank">-</div>

                <div class="stat-grid">
                    <div class="stat-card"><span class="stat-label">推定純利益</span><span class="stat-val"
                            id="res-profit">¥0</span></div>
                    <div class="stat-card"><span class="stat-label">推定販売日数</span><span class="stat-val" id="res-days">-
                            日</span></div>
                </div>

                <div class="res-container">
                    <div class="res-item">
                        <div class="res-header A">🔥 投資評価とプロの助言</div>
                        <div class="res-body" id="res-advice"></div>
                    </div>
                    <div class="res-item">
                        <div class="res-header S">🛡 真贋リスク評価</div>
                        <div class="res-body" id="res-risk"></div>
                    </div>
                    <div class="res-item">
                        <div class="res-header" style="color:var(--primary)">📈 SOLD実績の詳細分析</div>
                        <div class="res-body" id="res-sold"></div>
                    </div>
                    <div class="res-item">
                        <div class="res-header" style="color:var(--primary)">🚀 最強の販売戦略（撮影・SEO・回転）</div>
                        <div class="res-body" id="res-strategy"></div>
                    </div>
                    <div class="res-item">
                        <div class="res-header" style="color:var(--warning)">💰 業者買取相場・交渉術</div>
                        <div class="res-body" id="res-negotiation"></div>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;">
                    <button class="btn btn-sub" style="background:#00c853; color:#fff; border:none;"
                        onclick="shareToLine()">LINE共有</button>
                    <button class="btn btn-sub" onclick="saveToStock()">在庫保存</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
                    <button class="btn btn-quick" style="background:#333; color:#fff;"
                        onclick="quickSearch('mercari')">Mercari検索</button>
                    <button class="btn btn-quick" style="background:#333; color:#fff;"
                        onclick="quickSearch('yahoo')">Yahoo検索</button>
                </div>
            </div>

            <div style="text-align:center; margin-top:40px; font-size:0.6rem; color:#333; font-weight:800;">VER 1.4.1
                SUPREME EDITION</div>
        </div>

        <div id="view-db" style="display:none;">
            <h1>STOCK DATA</h1>
            <div id="db-list"></div>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar" style="display:none;">
        <a href="#" class="tab active" id="tab-judge" onclick="switchView('judge')"><i>👁</i><span>ANALYSIS</span></a>
        <a href="#" class="tab" id="tab-db" onclick="switchView('db')"><i>📦</i><span>STOCK</span></a>
    </div>

    <script>
        const PASS = "s9mxp3ao7kj1";
        let selectedB64 = [];
        let inventory = [];
        let lastResult = null;

        function checkAuth() {
            if (document.getElementById('auth-pass').value === PASS) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('tab-bar').style.display = 'flex';
                const k = localStorage.getItem('GOD_EYE_API');
                if (k) document.getElementById('api-key').value = k;
                loadInventory();
            } else { alert("ACCESS DENIED"); }
        }

        function loadInventory() {
            try {
                const data = localStorage.getItem('GOD_EYE_DB');
                inventory = data ? JSON.parse(data) : [];
                if (!Array.isArray(inventory)) inventory = [];
            } catch (e) { inventory = []; }
        }

        function log(m) {
            const d = document.getElementById('debug-log'); d.style.display = 'block';
            d.innerHTML += `> ${m}<br>`; d.scrollTop = d.scrollHeight;
        }

        async function handleImages(e) {
            const files = Array.from(e.target.files).slice(0, 15);
            document.getElementById('loader').style.display = 'block';
            for (let f of files) {
                await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 512) { h *= 512 / w; w = 512; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            const b64 = canvas.toDataURL('image/jpeg', 0.55);
                            selectedB64.push(b64.split(',')[1]);
                            const thumb = document.createElement('img'); thumb.src = b64; thumb.className = 'preview-img';
                            document.getElementById('preview-gallery').appendChild(thumb); r();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(f);
                });
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btn-clear').style.display = 'block';
            document.getElementById('btn-run').style.display = 'block';
        }

        function clearAll() {
            selectedB64 = []; document.getElementById('preview-gallery').innerHTML = "";
            document.getElementById('btn-clear').style.display = 'none'; document.getElementById('btn-run').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            lastResult = null;
        }

        async function analyzeImages() {
            const key = document.getElementById('api-key').value.trim();
            const buy = parseFloat(document.getElementById('val-buy').value) || 0;
            if (!key) return alert("APIキーを入力してください");
            if (buy <= 0) return alert("【エラー】仕入れ値（原価）を入力してください。利益計算ができません。");
            if (selectedB64.length === 0) return alert("画像を撮影してください");

            localStorage.setItem('GOD_EYE_API', key);
            document.getElementById('btn-run').style.display = "none";
            document.getElementById('loader').style.display = "block";
            document.getElementById('result-box').style.display = "none";
            log("GOD EYE SYSTEM STARTING...");

            let model = "gemini-1.5-flash";
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const d = await r.json();
                const best = d.models.find(m => m.name.includes("flash-exp") || m.name.includes("flash"));
                if (best) model = best.name.split('/').pop();
            } catch (e) { }

            const prompt = `あなたはプロのアパレルバイヤー兼真贋鑑定士です。必ず以下のJSONのみ返せ: {item_name, search_keyword, estimated_sell_price, estimated_days, final_rank, advice_text, risk_text, sold_text, strategy_text, dealer_quote_text}
回答ルール:
1. 文末は必ず「です・ます」の丁寧語。
2. 箇条書きを多用し、簡潔に要点をまとめること。
3. 利益 = 販売価格 - (${buy} + 送料 + 販売手数料)。
4. 商品のデザイン、素材、ビッグサイズ、希少性、季節性を加味して査定せよ。
5. 真贋リスクは具体的チェック箇所を明示せよ。
6. dealer_quote_textには「もし業者（セカスト等）に売却した場合の買取推定額」と「1円でも高く売るための交渉術」を記載せよ。
7. strategy_text（販売戦略）は極めて重要。「価値を1.5倍に見せる撮影のコツ」「目を引く検索キーワード」「売却期間を短縮する値決めのコツ」を具体的に網羅せよ。
8. final_rankは【S, A, B, C】のいずれか。`;

            const parts = [{ text: prompt }];
            selectedB64.forEach(b => parts.push({ inline_data: { mime_type: "image/jpeg", data: b } }));

            const versions = ["v1beta", "v1"];
            for (let ver of versions) {
                log(`UPLINK: ${ver} / ${model}`);
                try {
                    const url = `https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`;
                    const payload = { contents: [{ parts: parts }] };
                    if (ver === "v1beta") payload.tools = [{ google_search_retrieval: { dynamic_retrieval_config: { mode: "MODE_DYNAMIC", dynamic_threshold: 0.3 } } }];

                    const res = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);

                    const txt = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);
                    lastResult = json;

                    showResult(json);

                    document.getElementById('result-box').style.display = "block";
                    log("SUCCESS: ANALYSIS COMPLETE");
                    break;
                } catch (e) { log(`FAIL: ${e.message}`); }
            }
            document.getElementById('loader').style.display = "none";
            document.getElementById('btn-run').style.display = "block";
        }

        function showResult(json) {
            document.getElementById('res-name').innerText = json.item_name || "解析アイテム";
            document.getElementById('res-rank').innerText = json.final_rank || "A";
            document.getElementById('res-rank').style.color = (json.final_rank === 'S') ? 'var(--warning)' : (json.final_rank === 'A') ? 'var(--primary)' : (json.final_rank === 'B') ? '#00aaff' : 'var(--danger)';
            document.getElementById('res-days').innerText = `${json.estimated_days || 14} 日`;
            document.getElementById('res-advice').innerHTML = (json.advice_text || "").replace(/\n/g, '<br>');
            document.getElementById('res-risk').innerHTML = (json.risk_text || "").replace(/\n/g, '<br>');
            document.getElementById('res-sold').innerHTML = (json.sold_text || "").replace(/\n/g, '<br>');
            document.getElementById('res-strategy').innerHTML = (json.strategy_text || "").replace(/\n/g, '<br>');
            document.getElementById('res-negotiation').innerHTML = (json.dealer_quote_text || "").replace(/\n/g, '<br>');
            document.getElementById('val-search-key').value = json.search_keyword || json.item_name || "";

            document.getElementById('val-sell').value = json.estimated_sell_price || 0;
            calculateProfit();
        }

        function calculateProfit() {
            const buy = parseFloat(document.getElementById('val-buy').value) || 0;
            const sell = parseFloat(document.getElementById('val-sell').value) || 0;
            const commission = parseFloat(document.getElementById('val-platform').value);
            const shipping = parseFloat(document.getElementById('val-shipping').value) || 0;

            if (sell <= 0) {
                document.getElementById('res-profit').innerText = "相場不明";
                document.getElementById('res-profit').style.color = "var(--text-sub)";
                return;
            }

            const profit = Math.floor(sell - (sell * commission) - shipping - buy);
            document.getElementById('res-profit').innerText = `¥${profit.toLocaleString()}`;
            document.getElementById('res-profit').style.color = profit > 0 ? "var(--primary)" : "var(--danger)";
        }

        function quickSearch(type) {
            const kw = document.getElementById('val-search-key').value || "";
            if (!kw) return alert("先に解析を行ってください");
            if (type === 'mercari') window.open(`https://jp.mercari.com/search?keyword=${encodeURIComponent(kw)}&status=sold_out&sort=created_at&order=desc`);
            if (type === 'yahoo') window.open(`https://auctions.yahoo.co.jp/search/search?p=${encodeURIComponent(kw)}&va=${encodeURIComponent(kw)}&exflg=1&b=1&n=20&mode=2`);
        }

        function manualReserch() {
            window.open(`https://jp.mercari.com/search?keyword=ブランドアイテム&status=sold_out`);
        }

        function switchView(v) {
            document.getElementById('view-judge').style.display = v === 'judge' ? 'block' : 'none';
            document.getElementById('view-db').style.display = v === 'db' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + v).classList.add('active');
            if (v === 'db') renderDB();
        }

        function renderDB() {
            const list = document.getElementById('db-list');
            loadInventory();
            list.innerHTML = inventory.length ? "" : "<p style='text-align:center; color:#333; margin-top:50px;'>NO STOCK DATA</p>";
            inventory.forEach((item, idx) => {
                const d = document.createElement('div'); d.className = 'card';
                d.style.cursor = 'pointer';
                d.innerHTML = `<span class="label-sm">${item.date}</span><div style="font-weight:800;">${item.name}</div><div style="color:var(--primary); font-size:1.2rem; font-weight:800;">${item.profit}</div>
                <button onclick="event.stopPropagation(); delDB(${idx})" style="position:absolute; top:15px; right:15px; background:none; border:none; color:var(--danger); font-size:1.2rem;">×</button>`;
                d.onclick = () => {
                    if (item.fullData) {
                        lastResult = item.fullData;
                        showResult(item.fullData);
                        switchView('judge');
                    }
                };
                d.style.position = 'relative'; list.appendChild(d);
            });
        }
        function saveToStock() {
            if (!lastResult) return alert("解析データがありません");
            const name = lastResult.item_name || "アイテム";
            const profit = document.getElementById('res-profit').innerText;
            inventory.unshift({ name, profit, date: new Date().toLocaleDateString(), fullData: lastResult });
            localStorage.setItem('GOD_EYE_DB', JSON.stringify(inventory));
            alert("SAVED TO STOCK");
        }
        function delDB(i) { if (confirm("DELETE?")) { inventory.splice(i, 1); localStorage.setItem('GOD_EYE_DB', JSON.stringify(inventory)); renderDB(); } }

        ['val-buy', 'val-sell', 'val-shipping', 'val-platform'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateProfit);
        });
    </script>
</body>

</html>
